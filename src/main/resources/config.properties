# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                  SELENIUM FRAMEWORK - CONFIGURATION                        ║
# ║  Override any key at runtime:  mvn test -Dbrowser=firefox -Denv=staging    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────────────
#  ENVIRONMENT
# ─────────────────────────────────────────────────────────────────────────────
env                         = dev
base.url                    = https://the-internet.herokuapp.com

# ─────────────────────────────────────────────────────────────────────────────
#  BROWSER
# ─────────────────────────────────────────────────────────────────────────────
# Options: chrome | firefox | edge | safari
browser                     = chrome
headless                    = false

# ─────────────────────────────────────────────────────────────────────────────
#  TIMEOUTS (seconds)
# ─────────────────────────────────────────────────────────────────────────────
# Keep implicit.wait.seconds at 0 - rely on explicit waits (WaitUtils)
implicit.wait.seconds       = 0
explicit.wait.seconds       = 10
page.load.timeout.seconds   = 30
script.timeout.seconds      = 30
polling.interval.millis     = 500

# ─────────────────────────────────────────────────────────────────────────────
#  RETRY
# ─────────────────────────────────────────────────────────────────────────────
retry.max.count             = 1

# ─────────────────────────────────────────────────────────────────────────────
#  REPORTING
# ─────────────────────────────────────────────────────────────────────────────
report.title                = Selenium Automation Report
report.name                 = Test Execution Report

# ─────────────────────────────────────────────────────────────────────────────
#  JIRA / XRAY INTEGRATION
# ─────────────────────────────────────────────────────────────────────────────
xray.enabled                = false

# Mode: server (JIRA Server/DataCenter) | cloud (JIRA Cloud + Xray Cloud)
xray.mode                   = server

# Server / DC settings
xray.jira.url               = https://jira.yourcompany.com
xray.project.key            = PROJ
xray.execution.summary      = Automated Regression Suite
xray.fix.version            =
xray.test.plan.key          =

# Server auth - use bearer token OR basic auth (not both)
xray.bearer.token           =
xray.username               =
xray.password               =

# Cloud auth
xray.cloud.client.id        =
xray.cloud.client.secret    =

# ─────────────────────────────────────────────────────────────────────────────
#  SCREENSHOTS
# ─────────────────────────────────────────────────────────────────────────────
screenshot.on.failure       = true
screenshot.on.pass          = false

# ─────────────────────────────────────────────────────────────────────────────
#  TEST DATA
# ─────────────────────────────────────────────────────────────────────────────
testdata.dir                = testdata/
